version: "3.9"

# One shared volume for all state files.
# bot.py writes → notifier.py and dashboard.py read.
# Fixed the filename

volumes:
  quantbot_data:

services:

  bot:
    build:
      context: .
      target: bot
    container_name: quantbot_bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - quantbot_data:/app/data
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "5" }
    healthcheck:
      test: ["CMD", "python", "-c",
             "import json,sys,os; s=json.load(open(os.environ['DATA_DIR']+'/bot_state.json')); sys.exit(0)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  notifier:
    build:
      context: .
      target: notifier
    container_name: quantbot_notifier
    restart: unless-stopped
    env_file: .env
    volumes:
      - quantbot_data:/app/data
    depends_on:
      - bot
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "3" }

  dashboard:
    build:
      context: .
      target: dashboard
    container_name: quantbot_dashboard
    restart: unless-stopped
    env_file: .env
    volumes:
      - quantbot_data:/app/data
    ports:
      - "127.0.0.1:8050:8050"   # only on localhost — nginx proxies externally
    depends_on:
      - bot
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "3" }

  nginx:
    image: nginx:alpine
    container_name: quantbot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8888:8888"    # dashboard — IP-only mode (no SSL required)
      # - "443:443"    # uncomment after adding SSL certs + domain
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro     # SSL certs (Let's Encrypt — optional)
    depends_on:
      - dashboard
    logging:
      driver: "json-file"
      options: { max-size: "2m", max-file: "2" }