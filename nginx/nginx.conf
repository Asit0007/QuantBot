# nginx/nginx.conf — QuantBot reverse proxy
# Proxies dashboard on port 8050 → HTTPS on 443
# HTTP on 80 → redirects to HTTPS

# Replace YOUR_DOMAIN with your actual domain or Oracle VM's public IP.
# For IP-only access (no domain), remove the SSL server block and
# use the HTTP block only (remove the redirect).

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    # SSL certificates (Let's Encrypt via certbot)
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Basic auth — prevents anyone else viewing your P&L
    # Generate: htpasswd -nb admin yourpassword >> nginx/htpasswd
    auth_basic           "QuantBot Dashboard";
    auth_basic_user_file /etc/nginx/certs/htpasswd;

    # Proxy to Dash dashboard
    location / {
        proxy_pass         http://dashboard:8050;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}

