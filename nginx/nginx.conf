# nginx/nginx.conf — QuantBot reverse proxy
# ════════════════════════════════════════════════════════════════════
# DEFAULT: IP-only mode — no SSL required, works immediately on
# first deploy. Access dashboard at http://YOUR_VM_IP:8888
#
# TO ENABLE HTTPS later (after you have a domain):
#   1. Comment out the "IP-only" server block below
#   2. Uncomment the "HTTPS mode" server blocks
#   3. Replace YOUR_DOMAIN with your actual domain
#   4. Run certbot to get SSL certs into nginx/certs/
#   5. Generate htpasswd: htpasswd -nb admin yourpassword > nginx/htpasswd
#   6. Push — CI/CD will rebuild nginx automatically
# ════════════════════════════════════════════════════════════════════

# ── IP-only mode (default — works on first deploy, no domain needed) ──
server {
    listen 8888;
    server_name _;

    location / {
        proxy_pass         http://dashboard:8050;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}

